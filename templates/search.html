<!DOCTYPE html>
<html>
    <head>
        <title>CrawlerSearch Results</title>
    </head>

    <body>
        <div id="container">
            <canvas id="indexcanvas"></canvas>
            <div id="searchcontainer">
                <form action="/search" method="GET" id="searchform">
                    <input id="searchbar" name="q" value="{{ query }}" type="text">
                    <button id="searchbutton">
                        <svg version="1.1" id="_x32_" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512"  xml:space="preserve">
                        <style type="text/css">.st0{fill:#000000;}</style>
                        <g>
                            <path class="st0" d="M376.324,312.508c49.638-78.774,40.238-184.326-28.306-252.871c-79.507-79.515-208.872-79.515-288.388,0
                                c-79.507,79.516-79.507,208.873,0,288.379c68.536,68.544,174.115,77.935,252.88,28.306l135.668,135.676L512,448.186
                                L376.324,312.508z M296.543,296.542c-51.121,51.139-134.308,51.139-185.439,0c-51.121-51.121-51.112-134.299,0.009-185.43
                                c51.122-51.121,134.309-51.13,185.43-0.008C347.665,162.243,347.665,245.421,296.543,296.542z"/>
                        </g>
                        </svg>
                    </button>
                </form>

                <div id="results">
                    {% for hit in results %}
                    <div class="result">
                        <div style="display: flex; align-items: center;">
                            <svg 
                                class="previewsvg" onclick="previewlink(this, '{{ hit.url }}')"
                                version="1.1" id="Layer_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 480.606 480.606" xml:space="preserve">
                            <g>
                                <rect x="85.285" y="192.5" width="200" height="30"/>
                                <path d="M439.108,480.606l21.213-21.213l-71.349-71.349c12.528-16.886,19.949-37.777,19.949-60.371
                                    c0-40.664-24.032-75.814-58.637-92.012V108.787L241.499,0H20.285v445h330v-25.313c6.188-2.897,12.04-6.396,17.475-10.429
                                    L439.108,480.606z M250.285,51.213L299.072,100h-48.787V51.213z M50.285,30h170v100h100v96.957
                                    c-4.224-0.538-8.529-0.815-12.896-0.815c-31.197,0-59.148,14.147-77.788,36.358H85.285v30h126.856
                                    c-4.062,10.965-6.285,22.814-6.285,35.174c0,1.618,0.042,3.226,0.117,4.826H85.285v30H212.01
                                    c8.095,22.101,23.669,40.624,43.636,52.5H50.285V30z M307.389,399.208c-39.443,0-71.533-32.09-71.533-71.533
                                    s32.089-71.533,71.533-71.533s71.533,32.089,71.533,71.533S346.832,399.208,307.389,399.208z"/>
                            </g>
                            </svg>
                            <h2 class="resulttitle"><a href="{{ hit.url }}">{{ hit.title }}</a></h2>
                        </div>
                        <p class="resultsnippet">{{ hit.snippet }}</p>
                    </div>
                    {% endfor %}
                </div>
            </div>
            <div id="resultpreview">
                <iframe id="previewframe"></iframe>
            </div>
        </div>
        <footer>
            CrawlerSearch took {{ runtime }} seconds, displaying top {{ results | length }} hits from {{ total }} results
            <a href="https://github.com/mgurga/crawler" style="color: gray">Source Code</a>
        </footer>
    </body>


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kode+Mono:wght@700&display=swap');

        body {
            margin: 0;
        }

        footer {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: gray;
            margin-top: 10px;
            margin-bottom: 50px;
        }

        .previewsvg {
            height: 16pt;
            flex-shrink: 0;
            fill: #000000;
            cursor: pointer;
        }

        #container {
            display: flex;
            flex-direction: row;
        }

        #indexcanvas {
            width: 230px;
        }

        #results {
            display: grid;
            width: 700px;
            row-gap: 20px;
            margin-top: 15px;
        }

        #searchcontainer {
            display: inline;
            width: 700px;
            margin-top: 30px;
        }

        #resultpreview {
            display: inline;
            flex-grow: 1;
        }

        #previewframe {
            display: none;
            position: relative;
            border: 2px solid black;
            width: 60%;
            left: 20%;
            aspect-ratio: 2 / 2.2;
            padding: 10px;
        }

        .resulttitle {
            margin: 0;
            margin-bottom: 5px;
            font-family: "Kode Mono", monospace;
            font-size: 16pt;
        }

        .resultsnippet {
            margin: 0;
        }

        .result {
            display: inline-flex;
            flex-direction: column;
            justify-content: center;
        }

        .resultindex {
            display: flex;
            flex-shrink: 0;
            font-family: "Kode Mono", monospace;
            font-style: italic;
            border: 2px solid black;
            border-radius:50%;
            -moz-border-radius:50%;
            width: 70px;
            height: 70px;
            align-items: center;
            justify-content: center;
            margin-left: 30px;
            margin-right: 40px;
            background-color: white;
            z-index: 5;
        }

        #searchbar, #searchbutton {
            border-color: black;
            background-color: white;
        }

        #searchform {
            display: inline-flex;
            width: 60%;
        }

        #searchbutton {
            display: inline-flex;
            width: 50px;
            padding: 10px;
            border-left: none;
        }

        #searchbar {
            width: 80%;
            padding: 8px 10px;
            font-size: 16pt;
            border-right: none;

            font-family: "Kode Mono", monospace;
            font-optical-sizing: auto;
            font-weight: 600;
            font-style: normal;
        }
    </style>

    <script src="/script.js"></script>
</html>
